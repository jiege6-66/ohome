name: Release Clients

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Require tag ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run on a tag ref."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Restore Android signing files
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.ANDROID_STORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"

          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/android/upload-keystore.jks

          cat > app/android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        working-directory: app
        shell: bash
        run: |
          BUILD_METADATA_FILE="$RUNNER_TEMP/ohome-release.env" \
          RELEASE_TAG="${GITHUB_REF_NAME}" \
          bash build_prod.sh

          cat "$RUNNER_TEMP/ohome-release.env" >> "$GITHUB_ENV"

      - name: Prepare Android release assets
        shell: bash
        run: |
          APK_SOURCE="app/${APK_RELATIVE_PATH}"
          APK_ASSET="app/build/app/outputs/flutter-apk/ohome-release.apk"
          MANIFEST_ASSET="app/build/app/outputs/flutter-apk/android.json"

          cp "$APK_SOURCE" "$APK_ASSET"
          APK_SHA256=$(shasum -a 256 "$APK_ASSET" | awk '{print $1}')

          cat > "$MANIFEST_ASSET" <<EOF
          {
            "versionName": "${BUILD_NAME}",
            "versionCode": ${BUILD_NUMBER},
            "apkUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/ohome-release.apk",
            "sha256": "${APK_SHA256}",
            "releaseNotes": "GitHub Release ${GITHUB_REF_NAME}"
          }
          EOF

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          if-no-files-found: error
          path: |
            app/build/app/outputs/flutter-apk/ohome-release.apk
            app/build/app/outputs/flutter-apk/android.json

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Require tag ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run on a tag ref."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve release metadata
        shell: bash
        run: |
          METADATA_FILE="$(mktemp)"

          BUILD_METADATA_FILE="$METADATA_FILE" \
          RELEASE_TAG="${GITHUB_REF_NAME}" \
          bash app/build_prod.sh --dry-run

          cat "$METADATA_FILE" >> "$GITHUB_ENV"

      - name: Enable Windows desktop
        working-directory: app
        shell: bash
        run: flutter config --enable-windows-desktop

      - name: Build Windows release
        working-directory: app
        shell: bash
        run: |
          flutter pub get
          flutter build windows --release \
            --dart-define=APP_ENV=prod \
            --build-name="${BUILD_NAME}" \
            --build-number="${BUILD_NUMBER}"

      - name: Package Windows release assets
        shell: pwsh
        run: |
          $source = "app/build/windows/x64/runner/Release/*"
          $destination = "app/build/windows/ohome-windows-x64.zip"

          if (!(Test-Path "app/build/windows/x64/runner/Release/ohome.exe")) {
            throw "Windows build output not found: app/build/windows/x64/runner/Release/ohome.exe"
          }

          if (Test-Path $destination) {
            Remove-Item $destination -Force
          }

          Compress-Archive -Path $source -DestinationPath $destination

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: app/build/windows/ohome-windows-x64.zip

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-android
      - build-windows

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-assets/android

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets/windows

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-assets/android/ohome-release.apk
            release-assets/android/android.json
            release-assets/windows/ohome-windows-x64.zip
