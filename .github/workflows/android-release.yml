name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Require tag ref
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run on a tag ref."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Restore Android signing files
        shell: bash
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.ANDROID_STORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"

          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/android/upload-keystore.jks

          cat > app/android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        working-directory: app
        shell: bash
        run: |
          BUILD_METADATA_FILE="$RUNNER_TEMP/ohome-release.env" \
          CI_BUILD_NUMBER="${GITHUB_RUN_NUMBER}" \
          RELEASE_TAG="${GITHUB_REF_NAME}" \
          bash build_prod.sh

          cat "$RUNNER_TEMP/ohome-release.env" >> "$GITHUB_ENV"

      - name: Prepare release assets
        shell: bash
        run: |
          GH_PROXY_PREFIX="https://gh-proxy.org/"
          OUTPUT_DIR="app/build/app/outputs/flutter-apk"
          DEFAULT_ABI="arm64-v8a"
          MANIFEST_ASSET="app/build/app/outputs/flutter-apk/android.json"

          declare -A ABI_SOURCE_PATHS=(
            [arm64-v8a]="app/${APK_RELATIVE_PATH_ARM64_V8A}"
            [armeabi-v7a]="app/${APK_RELATIVE_PATH_ARMEABI_V7A}"
            [x86_64]="app/${APK_RELATIVE_PATH_X86_64}"
          )
          declare -A ABI_ASSET_PATHS=(
            [arm64-v8a]="${OUTPUT_DIR}/ohome-release-arm64-v8a.apk"
            [armeabi-v7a]="${OUTPUT_DIR}/ohome-release-armeabi-v7a.apk"
            [x86_64]="${OUTPUT_DIR}/ohome-release-x86_64.apk"
          )
          declare -A ABI_SHA256=()

          for abi in arm64-v8a armeabi-v7a x86_64; do
            cp "${ABI_SOURCE_PATHS[$abi]}" "${ABI_ASSET_PATHS[$abi]}"
            ABI_SHA256[$abi]=$(shasum -a 256 "${ABI_ASSET_PATHS[$abi]}" | awk '{print $1}')
          done

          cat > "$MANIFEST_ASSET" <<EOF
          {
            "versionName": "${BUILD_NAME}",
            "versionCode": ${BUILD_NUMBER},
            "apkUrl": "${GH_PROXY_PREFIX}https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/ohome-release-${DEFAULT_ABI}.apk",
            "sha256": "${ABI_SHA256[$DEFAULT_ABI]}",
            "releaseNotes": "GitHub Release ${GITHUB_REF_NAME}",
            "artifacts": {
              "arm64-v8a": {
                "apkUrl": "${GH_PROXY_PREFIX}https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/ohome-release-arm64-v8a.apk",
                "sha256": "${ABI_SHA256[arm64-v8a]}"
              },
              "armeabi-v7a": {
                "apkUrl": "${GH_PROXY_PREFIX}https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/ohome-release-armeabi-v7a.apk",
                "sha256": "${ABI_SHA256[armeabi-v7a]}"
              },
              "x86_64": {
                "apkUrl": "${GH_PROXY_PREFIX}https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/ohome-release-x86_64.apk",
                "sha256": "${ABI_SHA256[x86_64]}"
              }
            }
          }
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            app/build/app/outputs/flutter-apk/ohome-release-arm64-v8a.apk
            app/build/app/outputs/flutter-apk/ohome-release-armeabi-v7a.apk
            app/build/app/outputs/flutter-apk/ohome-release-x86_64.apk
            app/build/app/outputs/flutter-apk/android.json
